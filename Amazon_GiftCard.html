<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gift Card Tracker Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #2563eb; --secondary: #0f172a; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; }
        
        .top-dash { position: sticky; top: 0; z-index: 100; background: var(--secondary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .inr-text { font-size: 1.5rem; font-weight: 800; color: var(--success); }

        .container { max-width: 800px; margin: 15px auto; padding: 0 12px; }
        .item-card { background: white; border-radius: 12px; padding: 18px; margin-bottom: 15px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; position: relative; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .full-width { grid-column: span 2; }
        label { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input, select { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; }
        
        .scan-group { display: flex; gap: 6px; }
        .btn-scan { background: var(--secondary); color: white; border: none; padding: 0 12px; border-radius: 8px; cursor: pointer; }

        /* SCANNER OVERLAY */
        #scanner-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; }
        #reader { width: 100%; flex-grow: 1; position: relative; }
        
        /* The Visual "Hole" */
        .scan-region-highlight {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; height: 100px; border: 4px solid var(--success);
            border-radius: 8px; box-shadow: 0 0 0 4000px rgba(0,0,0,0.7);
            z-index: 100; pointer-events: none;
        }

        /* Preview Image (Shows after capture) */
        #snap-preview {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain; display: none; background: black; z-index: 150;
        }

        .scanner-footer { background: #000; padding: 25px; display: flex; flex-direction: column; align-items: center; gap: 15px; color: white; z-index: 200; }
        .btn-action { width: 80%; padding: 15px; border-radius: 50px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-capture { background: var(--success); color: white; }
        .btn-save { background: var(--primary); color: white; display: none; }
        .btn-retake { background: #444; color: white; display: none; }
        .btn-cancel { background: none; color: #999; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="top-dash">
    <div><div style="font-size: 10px; font-weight: bold; color: #94a3b8;">YEARLY TOTAL</div><div class="inr-text" id="totalINR">₹0.00</div></div>
</div>

<div class="container" id="expenseList"></div>

<div id="scanner-overlay">
    <div id="reader">
        <div class="scan-region-highlight"></div>
        <canvas id="snap-preview"></canvas>
    </div>
    <div class="scanner-footer">
        <div id="scan-status">Align alphanumeric code in box</div>
        
        <button id="capBtn" class="btn-action btn-capture" onclick="captureImage()">📷 CAPTURE CODE</button>
        
        <div id="confirmGroup" style="display:none; width: 100%; flex-direction: column; align-items: center; gap: 10px;">
            <div style="font-size: 12px; color: #aaa;">Is this code correct?</div>
            <div id="detected-text" style="font-size: 20px; font-weight: bold; color: var(--success); margin-bottom: 10px;"></div>
            <button class="btn-action btn-save" id="saveBtn" onclick="commitScan()">✅ SAVE CODE</button>
            <button class="btn-action btn-retake" id="retakeBtn" onclick="retake()">🔄 RETAKE</button>
        </div>

        <button class="btn-cancel" onclick="stopScanner()">CANCEL</button>
    </div>
</div>

<div class="bottom-actions" style="position:fixed; bottom:0; width:100%; background:white; padding:15px; display:flex; justify-content:center;">
    <button onclick="addNew()" class="btn-main" style="background:var(--primary); color:white; border:none; padding:12px 40px; border-radius:50px; font-weight:bold;">＋ Add New Entry</button>
</div>

<script>
    const DB_KEY = "Amazon_Tracker_V12";
    let html5QrCode = null;
    let currentInput = null;
    let tempDetectedText = "";

    function init() {
        const saved = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        document.getElementById('expenseList').innerHTML = "";
        if(saved.length === 0) addNew(); else saved.forEach(s => addNew(s));
        refresh();
    }

    function addNew(data = {}) {
        const id = data.id || Date.now();
        const div = document.createElement('div');
        div.className = "item-card";
        div.dataset.id = id;
        div.innerHTML = `
            <button class="btn-del" onclick="this.parentElement.remove(); save(); refresh();">✕</button>
            <div class="full-width"><label>Description</label><input type="text" class="d-item" value="${data.item || ''}" oninput="save();"></div>
            <div><label>Price (₹)</label><input type="number" class="d-price" value="${data.price || ''}" oninput="save(); refresh();"></div>
            <div><label>Gift Code</label><div class="scan-group">
                <input type="text" class="d-gccode" value="${data.gccode || ''}" oninput="save();">
                <button class="btn-scan" onclick="startScanner(this)">📷</button>
            </div></div>
        `;
        document.getElementById('expenseList').appendChild(div);
    }

    async function startScanner(btn) {
        currentInput = btn.parentElement.querySelector('input');
        document.getElementById('scanner-overlay').style.display = 'flex';
        retake(); // Reset UI state

        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

        try {
            await html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 15, videoConstraints: { width: { ideal: 4096 } } },
                () => {} // Not using live barcode success
            );
        } catch (err) { stopScanner(); }
    }

    async function captureImage() {
        const status = document.getElementById('scan-status');
        status.innerText = "Processing Text...";
        
        const video = document.querySelector('video');
        const canvas = document.getElementById('snap-preview');
        const ctx = canvas.getContext('2d');

        // Match preview size to display
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        
        // Show the frozen image
        canvas.style.display = 'block';
        
        // Crop the "Box" area for OCR (Middle 60% width, 20% height)
        const cropCanvas = document.createElement('canvas');
        cropCanvas.width = 800; cropCanvas.height = 300;
        const cropCtx = cropCanvas.getContext('2d');
        cropCtx.drawImage(video, video.videoWidth*0.1, video.videoHeight*0.4, video.videoWidth*0.8, video.videoHeight*0.2, 0, 0, 800, 300);

        try {
            const { data: { text } } = await Tesseract.recognize(cropCanvas, 'eng');
            tempDetectedText = text.replace(/[^A-Z0-9-]/gi, '').trim();
            
            document.getElementById('detected-text').innerText = tempDetectedText || "No text found";
            document.getElementById('capBtn').style.display = 'none';
            document.getElementById('confirmGroup').style.display = 'flex';
            document.getElementById('saveBtn').style.display = 'block';
            document.getElementById('retakeBtn').style.display = 'block';
            status.innerText = "Confirm the result";
        } catch (e) {
            status.innerText = "Error reading. Try again.";
            retake();
        }
    }

    function commitScan() {
        if(tempDetectedText) {
            currentInput.value = tempDetectedText;
            stopScanner();
            save();
        }
    }

    function retake() {
        document.getElementById('snap-preview').style.display = 'none';
        document.getElementById('capBtn').style.display = 'block';
        document.getElementById('confirmGroup').style.display = 'none';
        document.getElementById('scan-status').innerText = "Align alphanumeric code in box";
    }

    async function stopScanner() {
        if (html5QrCode && html5QrCode.isScanning) await html5QrCode.stop();
        document.getElementById('scanner-overlay').style.display = 'none';
    }

    function save() {
        const list = Array.from(document.querySelectorAll('.item-card')).map(c => ({
            item: c.querySelector('.d-item').value,
            price: c.querySelector('.d-price').value,
            gccode: c.querySelector('.d-gccode').value,
        }));
        localStorage.setItem(DB_KEY, JSON.stringify(list));
    }

    function refresh() {
        let total = 0;
        document.querySelectorAll('.d-price').forEach(p => total += (parseFloat(p.value) || 0));
        document.getElementById('totalINR').innerText = `₹${total.toLocaleString('en-IN')}`;
    }

    window.onload = init;
</
