<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Gift Card Tracker Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #2563eb; --secondary: #0f172a; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; }
        .top-dash { position: sticky; top: 0; z-index: 100; background: var(--secondary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .inr-text { font-size: 1.5rem; font-weight: 800; color: var(--success); }
        .container { max-width: 800px; margin: 15px auto; padding: 0 12px; }
        .item-card { background: white; border-radius: 12px; padding: 18px; margin-bottom: 15px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; position: relative; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-del { position: absolute; top: -10px; right: -10px; background: var(--danger); color: white; border: none; border-radius: 50%; width: 26px; height: 26px; cursor: pointer; z-index: 10; }
        .full-width { grid-column: span 2; }
        label { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input, select { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; }
        .scan-group { display: flex; gap: 6px; }
        .btn-scan { background: var(--secondary); color: white; border: none; padding: 0 12px; border-radius: 8px; cursor: pointer; }

        /* SCANNER UI */
        #scanner-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; }
        #reader { width: 100%; flex-grow: 1; position: relative; overflow: hidden; }
        .scan-window { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 100px; border: 4px solid var(--success); border-radius: 8px; box-shadow: 0 0 0 4000px rgba(0,0,0,0.7); z-index: 100; pointer-events: none; }
        #snap-preview { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; display: none; background: black; z-index: 150; }
        .scanner-footer { background: #000; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; color: white; z-index: 200; }
        .btn-action { width: 85%; padding: 15px; border-radius: 50px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-capture { background: var(--success); color: white; }
        .btn-confirm { background: var(--primary); color: white; }
        .btn-retake { background: #444; color: white; }
        .bottom-actions { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; justify-content: center; border-top: 1px solid #e2e8f0; z-index: 100; }
    </style>
</head>
<body>

<div class="top-dash">
    <div><div style="font-size: 10px; font-weight: bold; color: #94a3b8;">YEARLY TOTAL</div><div class="inr-text" id="totalINR">₹0.00</div></div>
</div>

<div class="container" id="expenseList"></div>

<div id="scanner-overlay">
    <div id="reader">
        <div class="scan-window"></div>
        <canvas id="snap-preview"></canvas>
    </div>
    <div class="scanner-footer">
        <div id="scan-status" style="margin-bottom: 5px; font-weight: bold;">Loading Back Camera...</div>
        <div style="width: 80%; display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
            <span style="font-size: 12px;">ZOOM</span>
            <input type="range" id="zoomCtrl" min="1" max="5" step="0.1" value="1" style="flex-grow: 1;">
        </div>
        <button id="capBtn" class="btn-action btn-capture" onclick="captureAndScan()">📷 CAPTURE & READ</button>
        <div id="confirmGroup" style="display:none; width: 100%; flex-direction: column; align-items: center; gap: 10px;">
            <input type="text" id="edit-result" style="width: 85%; text-align: center; font-size: 20px; padding: 12px; background: #222; color: #10b981; border: 1px solid #444;">
            <button class="btn-action btn-confirm" onclick="commitScan()">✅ SAVE CODE</button>
            <button class="btn-action btn-retake" onclick="resetScanner()">🔄 RETAKE</button>
        </div>
        <button onclick="stopScanner()" style="background:none; border:none; color:#999; margin-top: 10px;">CANCEL</button>
    </div>
</div>

<div class="bottom-actions">
    <button onclick="addNew()" style="background:var(--primary); color:white; border:none; padding:12px 40px; border-radius:50px; font-weight:bold;">＋ Add New Entry</button>
</div>

<script>
    const DB_KEY = "Tracker_V16_Final";
    let html5QrCode = null;
    let currentInput = null;
    let videoTrack = null;

    function init() {
        const saved = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        document.getElementById('expenseList').innerHTML = "";
        if(saved.length === 0) addNew(); else saved.forEach(s => addNew(s));
        refresh();
    }

    function addNew(data = {}) {
        const id = data.id || Date.now();
        const div = document.createElement('div');
        div.className = "item-card";
        div.dataset.id = id;
        div.innerHTML = `
            <button class="btn-del" onclick="this.parentElement.remove(); save(); refresh();">✕</button>
            <div class="full-width"><label>Description</label><input type="text" class="d-item" value="${data.item || ''}" oninput="save();"></div>
            <div><label>Price (₹)</label><input type="number" class="d-price" value="${data.price || ''}" oninput="save(); refresh();"></div>
            <div><label>Gift Code</label><div class="scan-group">
                <input type="text" class="d-gccode" value="${data.gccode || ''}" oninput="save();">
                <button class="btn-scan" onclick="openScanner(this)">📷</button>
            </div></div>
        `;
        document.getElementById('expenseList').appendChild(div);
    }

    async function openScanner(btn) {
        currentInput = btn.parentElement.querySelector('input');
        document.getElementById('scanner-overlay').style.display = 'flex';
        resetScanner();

        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

        try {
            // FORCE BACK CAMERA
            await html5QrCode.start(
                { facingMode: { exact: "environment" } }, 
                { fps: 20, videoConstraints: { width: { ideal: 1920 }, height: { ideal: 1080 } } },
                () => {}
            );
            
            videoTrack = html5QrCode.getRunningTrack();
            const caps = videoTrack.getCapabilities();
            const zoom = document.getElementById('zoomCtrl');
            if(caps.zoom) {
                zoom.min = caps.zoom.min; zoom.max = caps.zoom.max;
                zoom.oninput = () => videoTrack.applyConstraints({ advanced: [{ zoom: zoom.value }] });
            }
            document.getElementById('scan-status').innerText = "Back Camera Active - Point & Shoot";
        } catch (e) {
            // Fallback for some browsers that don't like 'exact'
            await html5QrCode.start({ facingMode: "environment" }, { fps: 20 }, () => {});
            document.getElementById('scan-status').innerText = "Camera Active";
        }
    }

    async function captureAndScan() {
        const status = document.getElementById('scan-status');
        status.innerText = "Analyzing Text... Please Wait";
        
        const video = document.querySelector('video');
        const canvas = document.getElementById('snap-preview');
        const ctx = canvas.getContext('2d');

        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        canvas.style.display = 'block';
        
        // CROP AREA (Center Box)
        const crop = document.createElement('canvas');
        crop.width = 800; crop.height = 300;
        const cropCtx = crop.getContext('2d');
        cropCtx.drawImage(video, video.videoWidth*0.1, video.videoHeight*0.4, video.videoWidth*0.8, video.videoHeight*0.2, 0, 0, 800, 300);

        try {
            const { data: { text } } = await Tesseract.recognize(crop, 'eng');
            const clean = text.replace(/[^A-Z0-9-]/gi, '').trim();
            document.getElementById('edit-result').value = clean || "RETAKE REQUIRED";
            document.getElementById('capBtn').style.display = 'none';
            document.getElementById('confirmGroup').style.display = 'flex';
            status.innerText = "Check Result";
        } catch (e) { status.innerText = "OCR Failed. Try again."; resetScanner(); }
    }

    function commitScan() {
        currentInput.value = document.getElementById('edit-result').value;
        stopScanner(); save();
    }

    function resetScanner() {
        document.getElementById('snap-preview').style.display = 'none';
        document.getElementById('capBtn').style.display = 'block';
        document.getElementById('confirmGroup').style.display = 'none';
        document.getElementById('scan-status').innerText = "Align code inside the box";
    }

    async function stopScanner() {
        if (html5QrCode && html5QrCode.isScanning) await html5QrCode.stop();
        document.getElementById('scanner-overlay').style.display = 'none';
    }

    function save() {
        const list = Array.from(document.querySelectorAll('.item-card')).map(c => ({
            item: c.querySelector('.d-item').value,
            price: c.querySelector('.d-price').value,
            gccode: c.querySelector('.d-gccode').value,
        }));
        localStorage.setItem(DB_KEY, JSON.stringify(list));
    }

    function refresh() {
        let t = 0; document.querySelectorAll('.d-price').forEach(p => t += (parseFloat(p.value) || 0));
        document.getElementById('totalINR').innerText = `₹${t.toLocaleString('en-IN')}`;
    }

    window.onload = init;
</script>
</body>
</html>
