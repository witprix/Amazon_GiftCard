<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Gift Card Tracker Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #2563eb; --secondary: #0f172a; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; }
        
        .top-dash { position: sticky; top: 0; z-index: 100; background: var(--secondary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .inr-text { font-size: 1.5rem; font-weight: 800; color: var(--success); }

        .container { max-width: 800px; margin: 15px auto; padding: 0 12px; }
        .item-card { background: white; border-radius: 12px; padding: 18px; margin-bottom: 15px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; position: relative; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .full-width { grid-column: span 2; }
        label { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input, select { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; }
        
        .scan-group { display: flex; gap: 6px; }
        .btn-scan { background: var(--secondary); color: white; border: none; padding: 0 12px; border-radius: 8px; cursor: pointer; }

        /* SCANNER OVERLAY FIX */
        #scanner-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; }
        #reader { width: 100%; flex-grow: 1; position: relative; overflow: hidden; }
        
        /* THE BOX - Forced to top */
        .scan-region-highlight {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; height: 100px;
            border: 4px solid var(--success);
            border-radius: 12px;
            box-shadow: 0 0 0 4000px rgba(0,0,0,0.6); /* Darkens outside area */
            z-index: 100000 !important; 
            pointer-events: none;
        }

        .scanner-controls {
            background: #000; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 100001;
        }
        
        .zoom-slider { width: 80%; accent-color: var(--success); }
        .cam-btns { display: flex; gap: 20px; width: 100%; justify-content: center; }
        .btn-cam-opt { background: #333; color: white; border: 1px solid #555; padding: 10px 20px; border-radius: 8px; font-size: 12px; }

        .btn-close { background: var(--danger); color: white; border: none; padding: 12px 50px; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>

<div class="top-dash">
    <div><div style="font-size: 10px; font-weight: bold; color: #94a3b8;">YEARLY TOTAL</div><div class="inr-text" id="totalINR">₹0.00</div></div>
</div>

<div class="container">
    <div id="expenseList"></div>
</div>

<div id="scanner-overlay">
    <div id="reader">
        <div class="scan-region-highlight"></div>
    </div>
    <div class="scanner-controls">
        <input type="range" id="zoomRange" class="zoom-slider" min="1" max="5" step="0.1" value="1">
        <div id="scan-status" style="color: white; font-size: 14px;">Align code inside box</div>
        <div class="cam-btns">
            <button class="btn-cam-opt" id="torchBtn">🔦 Toggle Flash</button>
        </div>
        <button class="btn-close" onclick="stopScanner()">CLOSE</button>
    </div>
</div>

<div class="bottom-actions" style="position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; display: flex; justify-content: center; border-top: 1px solid #ddd;">
    <button onclick="addNew()" style="background: var(--primary); color: white; padding: 12px 40px; border-radius: 50px; border: none; font-weight: bold;">＋ Add New Entry</button>
</div>

<script>
    const DB_KEY = "Tracker_Final_V9";
    let html5QrCode = null;
    let currentInput = null;
    let isProcessingOCR = false;

    function init() {
        const saved = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        document.getElementById('expenseList').innerHTML = "";
        if(saved.length === 0) addNew(); else saved.forEach(s => addNew(s));
        refresh();
    }

    function addNew(data = {}) {
        const id = data.id || Date.now();
        const div = document.createElement('div');
        div.className = "item-card";
        div.dataset.id = id;
        div.innerHTML = `
            <div class="full-width"><label>Description</label><input type="text" class="d-item" value="${data.item || ''}" oninput="save();"></div>
            <div><label>Price (₹)</label><input type="number" class="d-price" value="${data.price || ''}" oninput="save(); refresh();"></div>
            <div>
                <label>Gift Code</label>
                <div class="scan-group">
                    <input type="text" class="d-gccode" value="${data.gccode || ''}" oninput="save();">
                    <button class="btn-scan" onclick="startScanner(this, 'text')">📷</button>
                </div>
            </div>
            <button onclick="this.parentElement.remove(); save(); refresh();" style="grid-column: span 2; background: none; border: none; color: red; font-size: 11px;">Remove Entry</button>
        `;
        document.getElementById('expenseList').appendChild(div);
    }

    async function startScanner(btn, mode) {
        currentInput = btn.parentElement.querySelector('input');
        document.getElementById('scanner-overlay').style.display = 'flex';
        
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

        const config = { 
            fps: 10, 
            qrbox: { width: 300, height: 100 },
            aspectRatio: 1.0,
            // Requesting High Resolution
            videoConstraints: {
                facingMode: "environment",
                width: { ideal: 4096 },
                height: { ideal: 2160 }
            }
        };

        try {
            await html5QrCode.start({ facingMode: "environment" }, config, async (text) => {
                // If barcode mode
                if(mode === 'barcode') { currentInput.value = text; stopScanner(); save(); }
            });

            // Handle Zoom Support
            const track = html5QrCode.getRunningTrack();
            const capabilities = track.getCapabilities();
            const zoomRange = document.getElementById('zoomRange');
            
            if (capabilities.zoom) {
                zoomRange.min = capabilities.zoom.min;
                zoomRange.max = capabilities.zoom.max;
                zoomRange.step = capabilities.zoom.step;
                zoomRange.oninput = () => track.applyConstraints({ advanced: [{ zoom: zoomRange.value }] });
            }

            // Handle Flash/Torch
            document.getElementById('torchBtn').onclick = () => {
                const settings = track.getSettings();
                track.applyConstraints({ advanced: [{ torch: !settings.torch }] });
            };

            // OCR Loop for Text
            if (mode === 'text') {
                const ocrInterval = setInterval(async () => {
                    if (!html5QrCode.isScanning || isProcessingOCR) return;
                    isProcessingOCR = true;
                    
                    try {
                        const video = document.querySelector('#reader video');
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        // Crop to the visible green box area
                        canvas.width = 600; canvas.height = 200;
                        ctx.drawImage(video, video.videoWidth*0.2, video.videoHeight*0.4, video.videoWidth*0.6, video.videoHeight*0.2, 0, 0, 600, 200);
                        
                        const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
                        const code = text.replace(/[^A-Z0-9]/gi, '').trim();
                        
                        if (code.length > 8) {
                            currentInput.value = code;
                            clearInterval(ocrInterval);
                            stopScanner();
                            save();
                        }
                    } catch (e) {}
                    isProcessingOCR = false;
                }, 1000);
            }

        } catch (err) { console.error(err); stopScanner(); }
    }

    async function stopScanner() {
        if (html5QrCode) await html5QrCode.stop();
        document.getElementById('scanner-overlay').style.display = 'none';
    }

    function save() {
        const list = Array.from(document.querySelectorAll('.item-card')).map(c => ({
            item: c.querySelector('.d-item').value,
            price: c.querySelector('.d-price').value,
            gccode: c.querySelector('.d-gccode').value,
        }));
        localStorage.setItem(DB_KEY, JSON.stringify(list));
    }

    function refresh() {
        let total = 0;
        document.querySelectorAll('.d-price').forEach(input => {
            total += parseFloat(input.value) || 0;
        });
        document.getElementById('totalINR').innerText = `₹${total.toLocaleString('en-IN')}`;
    }

    window.onload = init;
</script>
</body>
</html>
